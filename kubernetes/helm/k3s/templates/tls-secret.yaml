{{- if .Values.ingress.enabled -}}
{{- /*
  Chart-managed TLS Secret for the db.dnaerys.org ingress.

  The certificate material is bundled with the chart under ./certs and injected here at render time:
    certs/full-chain-bundle.pem -> tls.crt  (leaf db.dnaerys.org + intermediate chain)
    certs/private_key.pem        -> tls.key  (matching RSA-2048 private key)
  Validated out-of-band before committing: the bundle's first cert is the
  db.dnaerys.org leaf (SAN db.dnaerys.org, www.db.dnaerys.org), the key matches
  that leaf, and the chain verifies up to the USERTrust root.

  The `required` guards fail the render (rather than emitting an empty/broken
  secret) if either file is missing or empty.
*/}}
{{- $crt := .Files.Get "certs/full-chain-bundle.pem" | required "tls-secret: certs/full-chain-bundle.pem is missing or empty" -}}
{{- $key := .Files.Get "certs/private_key.pem" | required "tls-secret: certs/private_key.pem is missing or empty" -}}
apiVersion: v1
kind: Secret
metadata:
  name: db.dnaerys-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "danny.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $crt | b64enc }}
  tls.key: {{ $key | b64enc }}
{{- end }}
