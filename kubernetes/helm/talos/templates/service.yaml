apiVersion: v1
kind: Service
metadata:
  name: {{ include "danny.fullname" . }}
  labels:
    {{- include "danny.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: h2c
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "danny.selectorLabels" . | nindent 4 }}