nameOverride: "dnaerys"
fullnameOverride: "dnaerys"

ringsTotal: 8 # specifies the number of logical nodes in the cluster, equals to number of pods when replicaCount = 1
replicaCount: 1

env:
  license_secret: "license"
  java_xmx: "-Xmx11g -Xms11g"

image:
  name: dnaerys/dnaerys-cluster
  pullPolicy: IfNotPresent
  tag: "1.18.1"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8002
  targetPort: 8000

pv:
  pvName:  dnaerys-kgp-pv
  pvcName: dnaerys-kgp-pvc
  nfsServer: "hostname"
  datasetPath: "path"
  storageClassName: ""

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: db.dnaerys.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: db.dnaerys-tls
      hosts:
        - db.dnaerys.org

resources:
  requests:
    memory: "14Gi"
    cpu: "2"
  limits:
    memory: "14Gi"  # requests == limits → Guaranteed QoS → pods are never evicted due to memory pressure