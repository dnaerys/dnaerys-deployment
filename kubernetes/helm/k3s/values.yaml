# All values are for a cohort the size of 1000 Genomes Project Dataset (3202 WGS)
# https://dnaerys.org/online/#1000-genomes-project-dataset
# adjust parameters as required for different volumes
nameOverride: "dnaerys"
fullnameOverride: "dnaerys"

ringsTotal: 8 # specifies the number of logical nodes in the cluster, equals to number of pods when replicaCount = 1
replicaCount: 1

env:
  license: ""
  java_xmx: "-Xmx11g -Xms11g"

image:
  name: dnaerys/dnaerys-cluster
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8002
  targetPort: 8000

# --- k3s single-node bare-metal storage ---
# Dataset lives on the host at hostPath and is mounted read-only into each pod
# at mountPath.
pv:
  pvName:  dnaerys-kgp-pv
  pvcName: dnaerys-kgp-pvc
  hostPath: /dnaerys/datasetname   # directory on the k3s host node
  mountPath: /dnaerys/dataset      # where the dataset is mounted inside the pod
  capacity: 60Gi
  # Empty string => statically bound PV/PVC, no dynamic provisioner.
  # Must NOT be "local-path" or k3s will try to dynamically provision.
  storageClassName: ""

ingress:
  enabled: true
  className: "nginx"
  # nginx ingress for the gRPC (HTTP/2) service. Unlike Traefik (where a router is
  # TLS-or-not, forcing two Ingress objects to serve :80 and :443 without a redirect),
  # nginx serves the same host on both :80 (cleartext) and :443 (TLS) from this single
  # Ingress, with the http->https bounce controlled by the ssl-redirect annotation.
  #   backend-protocol: GRPC  -> nginx speaks gRPC/h2c to the pod, preserving HTTP/2
  #                              end-to-end (TLS/h2 from the client -> h2c to the pod).
  #   ssl-redirect: "false"   -> :80 is served as cleartext and is NOT redirected to
  #                              :443, matching the previous Traefik behaviour of
  #                              serving both ports without a redirect.
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: db.dnaerys.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ""
      hosts:
        - db.dnaerys.org

# --- Artery remoting transport ---
# Selects the Akka Artery transport via the ARTERY_TRANSPORT env var (see artery.conf).
# The application default is "tcp"; this k3s config activates "aeron-udp".
# All Aeron-only infrastructure below (UDP port, /dev/shm tmpfs, memory bump) is rendered
# only when transport == "aeron-udp"; with "tcp" the deployment renders exactly as before.
artery:
  transport: aeron-udp   # "tcp" | "aeron-udp"
  aeron:                  # only used when transport == "aeron-udp"
    # UDP port Aeron binds for pod-to-pod remoting. Must match the Akka Artery
    # canonical/bind port.
    udpPort: 25520
    # tmpfs size for /dev/shm backing the embedded Aeron media driver.
    # Sized for ringsTotal peers × maximum-frame-size (2 MiB → 16 MiB term buffers).
    # Counts against the pod memory limit, which is bumped by this amount below.
    # Must use "Gi" units (added to resources.*.memory which are also in "Gi").
    devShmSize: 2Gi
    # CPU time used during backoff/idle, on a scale between 1 and 10 (see artery.conf).
    # Wired into the app via the ARTERY_IDLE_CPU_LEVEL env var. Level 1 strongly prefers
    # low CPU consumption over low latency; level 10 strongly prefers low latency.
    # idle-cpu-level = 10 caused load avg 32 across 8 idle pods, hence the conservative default.
    idleCpuLevel: 1

resources:
  requests:
    memory: "14Gi"
    cpu: "4"
  limits:
    memory: "14Gi"  # requests == limits → Guaranteed QoS → pods are never evicted due to memory pressure
                    # NB: when artery.transport == "aeron-udp", the /dev/shm tmpfs counts against this
                    # limit, so the deployment template adds artery.aeron.devShmSize to both request & limit.
